<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione Assistente Onda e Nuvola</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* Contenitore per l'effetto di fusione (Metaball) */
        .ai-indicator {
            position: relative;
            width: 140px;
            height: 140px;
            filter: blur(4px) contrast(20);
            background: #1a1a1a;
            /* NON ruota più — resta fermo */
        }

        /* Wrapper interno: ruota solo questo in modalità pensiero */
        .orbit-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* La singola barretta/sfera */
        .bar {
            position: absolute;
            background: white;
            border-radius: 20px;
            top: 50%;
            /* Transizione fluida quando cambiano forma e posizione */
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-50%);
        }

        /* Elementi extra per riempire la nuvola — invisibili in ascolto */
        .cloud-fill {
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 0;
            height: 0;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* =========================================
           STATO ASCOLTO: L'onda da sinistra a destra
           ========================================= */
        .listening .bar {
            width: 12px;
            height: 15px; /* Altezza minima */
        }

        /* Posizionamento e ritardo dell'onda (effetto sweep L -> R) */
        .listening .b1 { left: 20px;  animation: sweep-wave 1.2s infinite ease-in-out 0.0s; }
        .listening .b2 { left: 40px;  animation: sweep-wave 1.2s infinite ease-in-out 0.15s; }
        .listening .b3 { left: 60px;  animation: sweep-wave 1.2s infinite ease-in-out 0.30s; }
        .listening .b4 { left: 80px;  animation: sweep-wave 1.2s infinite ease-in-out 0.45s; }
        .listening .b5 { left: 100px; animation: sweep-wave 1.2s infinite ease-in-out 0.60s; }

        @keyframes sweep-wave {
            0%, 100% { height: 15px; }
            50% { height: 50px; }
        }

        /* =========================================
           STATO PENSIERO: La nuvola rotante
           ========================================= */
        /* Ruota solo il wrapper interno, il contenitore resta fermo */
        .thinking .orbit-wrapper {
            animation: spin-cloud 4s infinite linear;
        }

        @keyframes spin-cloud {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Le barre si trasformano in cerchi e si ammassano */
        .thinking .bar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            animation: pulse-orb 2s infinite alternate ease-in-out;
        }

        /* Posizioni dense per formare una nuvola senza buco al centro */
        .thinking .b1 { left: 35px; top: 37%; animation-delay: 0.0s; }
        .thinking .b2 { left: 55px; top: 33%; animation-delay: 0.3s; width: 38px; height: 38px; }
        .thinking .b3 { left: 63px; top: 50%; animation-delay: 0.6s; }
        .thinking .b4 { left: 42px; top: 54%; animation-delay: 0.2s; width: 32px; height: 32px; }
        .thinking .b5 { left: 27px; top: 47%; animation-delay: 0.5s; width: 30px; height: 30px; }

        /* Elementi di riempimento — appaiono con transizione fluida */
        .thinking .cloud-fill {
            animation: pulse-orb 2s infinite alternate ease-in-out;
        }
        .thinking .c1 { width: 42px; height: 42px; left: 40px; top: 42%; animation-delay: 0.1s; }
        .thinking .c2 { width: 30px; height: 30px; left: 52px; top: 45%; animation-delay: 0.4s; }
        .thinking .c3 { width: 28px; height: 28px; left: 38px; top: 46%; animation-delay: 0.7s; }

        @keyframes pulse-orb {
            0% { transform: translateY(-50%) scale(0.9); }
            100% { transform: translateY(-50%) scale(1.1); }
        }

        /* Controlli */
        .controls { margin-top: 40px; display: flex; gap: 15px; }
        button { padding: 12px 24px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ai-indicator listening" id="indicator">
        <div class="orbit-wrapper">
            <div class="bar b1"></div>
            <div class="bar b2"></div>
            <div class="bar b3"></div>
            <div class="bar b4"></div>
            <div class="bar b5"></div>
            <!-- Riempimento nuvola (invisibili in ascolto) -->
            <div class="cloud-fill c1"></div>
            <div class="cloud-fill c2"></div>
            <div class="cloud-fill c3"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="setState('listening')">Ascolto (Onda)</button>
        <button onclick="setState('thinking')">Pensiero (Nuvola Rotante)</button>
    </div>

    <script>
        function setState(state) {
            document.getElementById('indicator').className = `ai-indicator ${state}`;
        }
    </script>
</body>
</html>
